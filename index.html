<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HONGJIN LEE · 앱 안내</title>
  <meta name="description" content="HONGJIN LEE가 만든 앱들의 고객 지원과 개인정보처리방침 안내 페이지입니다.">
  <style>
    :root {
      --grad-start: #4776E6;
      --grad-end: #8E54E9;
      --text: #1f2333;
      --text-muted: #6b7280;
      --card-bg: rgba(255, 255, 255, 0.92);
      --border: rgba(255, 255, 255, 0.6);
      --shadow: 0 20px 40px rgba(71, 118, 230, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Pretendard", "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      background-attachment: fixed;
      padding: 48px 16px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: #fff;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 28px;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    header p {
      opacity: 0.92;
      font-size: 15px;
    }

    .app-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 26px 48px rgba(71, 118, 230, 0.26);
    }

    .app-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-logo {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #fff;
      font-weight: 800;
      font-size: 24px;
    }

    .app-info { flex: 1 1 auto; }
    .app-info h2 {
      font-size: 18px;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }
    .app-info p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .app-links {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .app-links a {
      font-size: 13px;
      font-weight: 600;
      color: var(--grad-end);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #ececf3;
      border-radius: 999px;
      transition: background 0.15s ease;
    }
    .app-links a:hover { background: #f6f5fc; }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      margin-top: 24px;
    }

    @media (max-width: 480px) {
      body { padding: 32px 12px; }
      header h1 { font-size: 24px; }
      .app-card { padding: 20px 22px; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>앱 안내</h1>
      <p>HONGJIN LEE가 만든 앱의 고객 지원과 개인정보처리방침입니다.</p>
    </header>

    <!-- 머니루틴 -->
    <div class="app-card">
      <div class="app-row">
        <div class="app-logo" aria-hidden="true">₩</div>
        <div class="app-info">
          <h2>머니루틴</h2>
          <p>고정지출·월별 가계 관리</p>
        </div>
      </div>
      <div class="app-links">
        <a href="money-routine/">고객 지원</a>
        <a href="money-routine/privacy.html">개인정보처리방침</a>
      </div>
    </div>
    <!-- 새 앱 추가 시 위 .app-card 블록을 복제하세요. -->

    <footer>
      <p>© 2026 HONGJIN LEE. All rights reserved.</p>
    </footer>
  </main>
</body>
</html>
